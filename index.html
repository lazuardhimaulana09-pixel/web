<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Langit Malam Berbintang</title>
    <link rel="stylesheet" href="asal1.css">
</head>
<body>
    <div class="bio-section">
        <div class="profile-card">
            <div class="profile-photo-border">
                <img src="ChatGPT Image Jan 14, 2026, 06_48_34 PM.png" alt="Foto Profil" class="profile-photo">
            </div>
            <h1 class="bio-name">Lazuardhi Akbar Maulana Tsani</h1>
            <p class="bio-title">Anak SMKN 1 MOJOKERTO</p>
            <p class="bio-description">
                Selamat datang di halaman personal saya! Saya adalah seorang penggemar teknologi dengan minat yang besar dalam pengembangan web dan desain visual. Saya suka menciptakan pengalaman digital yang indah dan fungsional.
            </p>
            <div class="social-links">
                <a href="https://github.com/lazuardhimaulana09-pixel" target="_blank">GitHub</a>
                <a href="https://www.linkedin.com/in/lazuus-the-equator-296696385/?trk=opento_sprofile_goalscard" target="_blank">LinkedIn</a>
                <a href="#" target="_blank">Instagram</a>
            </div>
        </div>
    </div>

    <div class="sky" id="sky">
        <div class="stars"></div>
        <div class="moon"></div>
    </div>

    <script>
    const sky = document.getElementById('sky');

    function createSpark(x, y) {
        // Membuat 8-10 partikel setiap kali klik
        for (let i = 0; i < 10; i++) {
            const particle = document.createElement('div');
            particle.classList.add('particle');

            // Posisi awal partikel di titik kursor/sentuhan
            particle.style.left = x + 'px';
            particle.style.top = y + 'px';

            // Menentukan arah ledakan acak menggunakan CSS Variables
            const destinationX = (Math.random() - 0.5) * 200 + 'px';
            const destinationY = (Math.random() - 0.5) * 200 + 'px';

            particle.style.setProperty('--x', destinationX);
            particle.style.setProperty('--y', destinationY);

            sky.appendChild(particle);

            // Hapus elemen setelah animasi selesai agar tidak memberatkan browser
            setTimeout(() => {
                particle.remove();
            }, 800);
        }
    }

    // Deteksi Klik Mouse
    sky.addEventListener('mousedown', (e) => {
        createSpark(e.clientX, e.clientY);
    });

    // Deteksi Sentuhan Layar HP
    sky.addEventListener('touchstart', (e) => {
        // Mencegah scroll saat menyentuh layar
        const touch = e.touches[0];
        createSpark(touch.clientX, touch.clientY);
    });
</script>
</body>
</html>
